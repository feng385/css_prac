<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .first {
            letter-spacing: 10px;
            text-decoration: overline;
        }
        .second {
            font-size: 60px;
            word-spacing: 20px;
            text-indent: 20px;
        }
        .second span {
            font-size: 30px;
            /* control the vertical position */
            vertical-align: middle;

        }
        .third {
            background-color: yellow;
            text-align: center;
            line-height: 50px;
            /* line-height: 1.5; */
            height: 50px;

        }
    </style>
</head>
<body>
    <div class="first">this is a test.</div>
    <div class="second">this is a test.this is a test.this is a test.<span>this is a test.</span></div>
    <div class="third">this is a test.</div>
    <div class="fourth">this is a test.</div>
    <div class="fifth">this is a test.</div>
</body>
</html>
