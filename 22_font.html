<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .first {
            font-size: 10px;
            /* Font types */
            font-family:'Times New Roman';
        }
        .second {
            font-size: 20px;
            font-style: normal;
            /* width */
            font-weight: bold;
        }
        .third {
            font-size: 30px;
            
            font-style: italic;
            font-weight: 100;
        }
        .fourth {
            /* font size and type should be put last */
            font: italic 40px 'Times New Roman';
        }
        .fifth {
            font-size: 50px;
        }
    </style>
</head>
<body>
    <div class="first">first line</div>
    <div class="second">second line</div>
    <div class="third">third line</div>
    <div class="fourth">fourth line</div>
    <div class="fifth">fifth line</div>
</body>
</html>
